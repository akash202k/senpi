---
# Native Kubernetes Secret for AI Model Credentials
# This secret will be created by Crossplane composition
# Users provide encrypted API keys which get stored here
apiVersion: v1
kind: Secret
metadata:
  name: ai-model-credentials
  # namespace will be dynamically set by Crossplane (e.g., alice, bob)
type: Opaque
data:
  # These fields will be populated by Crossplane patches
  # encrypted-api-key: base64_encoded_value
  # salt: base64_encoded_value
  # model-provider: base64_encoded_value (openai, anthropic, etc.)
  # model-name: base64_encoded_value (gpt-4, claude-opus, etc.)